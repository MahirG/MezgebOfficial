name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install --no-audit --no-fund --silent
      - name: Lint
        id: lint
        shell: bash
        run: |
          set +e
          npm run lint > lint.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload lint diagnostics
        if: steps.lint.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: lint-diagnostics
          path: lint.log
          retention-days: 3
      - name: Enforce lint result
        if: steps.lint.outputs.exit_code != '0'
        run: exit 1
      - name: TypeScript
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload TypeScript diagnostics
        if: steps.typecheck.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          retention-days: 3
      - name: Enforce TypeScript result
        if: steps.typecheck.outputs.exit_code != '0'
        run: exit 1
      - name: Unit tests
        id: unit-tests
        shell: bash
        run: |
          set +e
          npm test > unit-tests.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload unit-test diagnostics
        if: steps.unit-tests.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-diagnostics
          path: unit-tests.log
          retention-days: 3
      - name: Enforce unit-test result
        if: steps.unit-tests.outputs.exit_code != '0'
        run: exit 1
      - name: Validate Supabase email templates
        run: npm run email:validate
      - name: Production build
        id: production-build
        shell: bash
        run: |
          set +e
          npm run build > build.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload build diagnostics
        if: steps.production-build.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: build.log
          retention-days: 3
      - name: Enforce build result
        if: steps.production-build.outputs.exit_code != '0'
        run: exit 1
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install --no-audit --no-fund --silent
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Browser tests
        id: browser-tests
        shell: bash
        run: |
          set +e
          npm run test:e2e > e2e.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload browser diagnostics
        if: steps.browser-tests.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          path: |
            e2e.log
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 3
      - name: Enforce browser result
        if: steps.browser-tests.outputs.exit_code != '0'
        run: exit 1
