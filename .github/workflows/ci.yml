name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install --no-audit --no-fund --silent
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - name: Production build
        shell: bash
        run: |
          npm run build > build.log 2>&1 || {
            echo "BUILD_FAILED"
            tail -n 45 build.log
            exit 1
          }
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install --no-audit --no-fund --silent
      - name: Install Chromium
        shell: bash
        run: |
          npx playwright install --with-deps chromium > playwright-install.log 2>&1 || {
            tail -n 35 playwright-install.log
            exit 1
          }
      - name: Browser tests
        shell: bash
        run: |
          npm run test:e2e > e2e.log 2>&1 || {
            echo "E2E_FAILED"
            tail -n 55 e2e.log
            exit 1
          }
